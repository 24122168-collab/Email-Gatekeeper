name: email-triage-env
version: "1.0.0"

description: RL environment for email triage

author: zerogravity
license: MIT
python_requires: ">=3.10"

entry_point: "env:EmailTriageEnv"

observation_space:
  type: object
  properties:
    description:
      type: string
    step:
      type: integer
    remaining:
      type: integer

action_space:
  type: array
  items:
    type: integer
  length: 3

# ✅ FIXED TASKS (IMPORTANT)
tasks:
  - id: easy
    description: Simple email classification
  - id: medium
    description: Mixed intent emails
  - id: hard
    description: Complex multi-intent and security emails

reward_range: [0.0, 1.0]

dependencies:
  - numpy>=1.24.0

reproducibility:
  deterministic: true
  baseline_script: inference.py
